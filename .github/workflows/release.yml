name: Release

# On merge to main: if microbrrrute_studio.__version__ names a version that has
# no v<version> tag yet, build standalone executables and publish a GitHub
# Release. Merges without a version bump are no-ops.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
      released: ${{ steps.v.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: v
        shell: bash
        run: |
          VERSION=$(python3 -c "import re,pathlib; t=pathlib.Path('microbrrrute_studio/__init__.py').read_text(); print(re.search(r'__version__\s*=\s*[\x27\"]([^\x27\"]+)', t).group(1))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "::notice::v$VERSION already released — skipping."
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Will build and release v$VERSION."
          fi

  build:
    needs: version
    if: needs.version.outputs.released == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: microBRRRute_Studio-windows-x64.zip
            built: dist/microBRRRute_Studio.exe
          - os: ubuntu-latest
            artifact: microBRRRute_Studio-linux-x64.zip
            built: dist/microBRRRute_Studio
          - os: macos-latest
            artifact: microBRRRute_Studio-macos-x64.zip
            built: dist/microBRRRute_Studio
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Tk runtime libs (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk
      - name: Verify Tkinter is importable
        run: python -c "import tkinter; print('Tk', tkinter.TkVersion)"
      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller
      - name: Build executable
        run: python -m PyInstaller --noconfirm microBRRRute_Studio.spec
      - name: List build output
        run: ls -R dist/
      - name: Stage and Compress artifact
        shell: bash
        run: |
          mkdir -p staging
          cp "${{ matrix.built }}" staging/
          cp around_the_world.mbseq staging/
          cd staging
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "../${{ matrix.artifact }}" *
          else
            zip -r "../${{ matrix.artifact }}" *
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: [version, build]
    if: needs.version.outputs.released == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: ls -R artifacts
      - name: Prune old releases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Pruning existing releases..."
          # Read tag names from structured output instead of parsing table text.
          RELEASES=$(gh release list --limit 1000 --json tagName --jq '.[].tagName')
          for tag in $RELEASES; do
            echo "Deleting release: $tag"
            gh release delete "$tag" --yes --cleanup-tag || echo "Failed to delete release/tag $tag (it might be gone already)"
          done
          # Extra safety: delete any orphaned tags that might be left
          TAGS=$(git tag)
          for tag in $TAGS; do
            if [[ "$tag" != "${{ needs.version.outputs.tag }}" ]]; then
              echo "Deleting orphaned tag: $tag"
              git push --delete origin "$tag" || true
            fi
          done
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: microBRRRute Studio ${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: artifacts/*
